    seeds: [10, 23, 33, 41, 54]
  - id: wooden_pickaxe
    name: Craft a wooden pickaxe
    description: Wood -> planks -> sticks -> table -> wooden pickaxe.
    category: craft
    success_criteria: "inventory contains >= 1 wooden_pickaxe"
    checker: programmatic
    max_steps: 80
    seeds: [10, 23, 33, 41, 54]
